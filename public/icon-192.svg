<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" fill="#090909" rx="40"/>
  <!-- outer circle -->
  <circle cx="96" cy="96" r="56" stroke="#E8E6DF" stroke-width="3.5" fill="none"/>
  <!-- center dot -->
  <circle cx="96" cy="96" r="5" fill="#E8E6DF"/>
  <!-- 6 spokes radiating from center -->
  <line x1="96" y1="96" x2="132" y2="96" stroke="#E8E6DF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="114" y2="127.14" stroke="#E8E6DF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="78" y2="127.14" stroke="#E8E6DF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="60" y2="96" stroke="#E8E6DF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="78" y2="64.86" stroke="#E8E6DF" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="114" y2="64.86" stroke="#E8E6DF" stroke-width="3.5" stroke-linecap="round"/>
  <!-- top accent line (the 7th spoke upward) -->
  <line x1="96" y1="96" x2="96" y2="50" stroke="#E8E6DF" stroke-width="3.5" stroke-linecap="round"/>
</svg>
